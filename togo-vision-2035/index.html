body{font-family:'Poppins',-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:#006A4A;color:#13241d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.3);width:100%;max-width:380px;overflow:hidden}

.err{color:#D21034;font-size:11.5px;margin-top:11px;min-height:15px;font-weight:500}
.ft{font-size:10px;color:#9aa39d;margin-top:18px}

async function unlock(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:dec(P.salt),iterations:P.iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(P.iv)},key,dec(P.ct));
  return new TextDecoder().decode(pt);
}
